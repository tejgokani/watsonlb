# WatsonLB Proxy — Fly.io config
# Deploy: fly deploy --config apps/proxy/fly.toml

app = "watsonlb-proxy"
primary_region = "bom" # Mumbai — closest to Indian users

[build]
  dockerfile = "apps/proxy/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/health"
    port = 3001
    timeout = "5s"
    type = "http"
