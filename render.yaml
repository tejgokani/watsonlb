services:
  - type: web
    name: watsonlb-proxy
    runtime: docker
    dockerfilePath: ./apps/proxy/Dockerfile
    region: singapore
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      # Set these in Render dashboard → Environment:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PROXY_BASE_URL
        sync: false          # e.g. https://watsonlb-proxy.onrender.com
      - key: DASHBOARD_URL
        sync: false          # e.g. https://watsonlb.vercel.app
        # ── Vercel dashboard env vars (set in Vercel project settings, not here) ──
        # NEXT_PUBLIC_API_URL   → https://watsonlb-proxy.onrender.com
        # NEXT_PUBLIC_PROXY_URL → https://watsonlb-proxy.onrender.com
      # Optional — leave blank to skip email/payments until approved:
      - key: ADMIN_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
